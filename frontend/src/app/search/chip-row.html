<div class="chip-row">
  <span class="chip-row-label">{{ label() }}</span>
  <div class="chip-row-chips" role="group" [attr.aria-label]="label()">
    @for (opt of options(); track opt[0]) {
      <button
        type="button"
        class="chip"
        [class.chip-on]="isSelected(opt[0])"
        [attr.aria-pressed]="isSelected(opt[0])"
        (click)="onChipClick(opt[0])"
      >{{ opt[1] }}</button>
    }
  </div>
</div>
