<div class="fees-picker" data-testid="fees-picker">
  <div class="tier-row">
    @for (t of tiers; track t.key) {
      <button
        type="button"
        class="tier-btn"
        [class.tier-btn-active]="activeTier() === t.key"
        [disabled]="!fees()"
        (click)="pickTier(t)"
        [attr.data-testid]="'fees-picker-tier-' + t.key"
        [attr.data-active]="activeTier() === t.key"
      >
        <span class="tier-label">{{ t.label }}</span>
        <span class="tier-rate">{{ fees() ? (fees()![t.payloadKey] | number:'1.0-2') : '…' }} sat/vB</span>
      </button>
    }
  </div>

  <label class="manual-row">
    <span class="manual-label">or manual</span>
    <input
      type="number"
      class="manual-input"
      [min]="minFeeRate()"
      step="any"
      [ngModel]="manualInput()"
      (ngModelChange)="onManualInputChange($event)"
      [attr.aria-label]="'Fee rate in sat/vB'"
      data-testid="fees-picker-manual-input"
    >
    <span class="manual-unit">sat/vB</span>
  </label>
</div>
