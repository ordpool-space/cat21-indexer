@if (catResource.error()) {
  <div class="mt-4" role="alert">
    <strong>Cat not found.</strong>
    <p class="mt-2">This cat does not exist (yet).</p>
    <a routerLink="/" class="btn btn-primary fw-bold mt-2">« Back</a>
  </div>
} @else if (catResource.isLoading()) {
  <!-- Placeholder: same structure as loaded state to prevent layout shift -->
  <nav class="clearfix" aria-label="Cat navigation">
    <span class="fw-bold mt-4 mb-4 float-start">&nbsp;</span>
  </nav>
  <article class="cat-box" aria-live="polite">
    <app-cat21-viewer [cat]="undefined" [showDetails]="true" />
  </article>
  <a routerLink="/" class="btn btn-primary fw-bold mt-4 mb-4">« Back</a>
} @else if (catResource.value(); as cat) {
  <nav class="clearfix" aria-label="Cat navigation">
    @if (cat.catNumber < lastSynced()) {
      <a
        [routerLink]="['/cat', cat.catNumber + 1]"
        class="fw-bold mt-4 mb-4 float-start"
        [attr.aria-label]="'Newer: CAT #' + (cat.catNumber + 1)">« Newer</a>
    }
    @if (cat.catNumber > 0) {
      <a [routerLink]="['/cat', cat.catNumber - 1]"
        class="fw-bold mt-4 mb-4 float-end"
        [attr.aria-label]="'Older: CAT #' + (cat.catNumber - 1)">Older »</a>
    }
  </nav>
  <article class="cat-box">
    <app-cat21-viewer
      [cat]="cat"
      [showDetails]="true" />
  </article>
  <a routerLink="/" class="btn btn-primary fw-bold mt-4 mb-4">« Back</a>
}
