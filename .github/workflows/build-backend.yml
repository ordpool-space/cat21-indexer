name: Build Backend

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      working-directory: backend
      run: npm ci

    - name: Run tests
      working-directory: backend
      run: npm test

    - name: Build production
      working-directory: backend
      run: npm run build

    - name: Prepare deploy artifact
      working-directory: backend
      run: |
        cp package.json dist/
        cp package-lock.json dist/
        cd dist && node -e "
          const pkg = require('./package.json');
          pkg.scripts = { start: 'node main.js' };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "

    - name: Deploy to ordpool-space/cat21-backend-build
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      working-directory: backend
      run: |
        npx angular-cli-ghpages \
          --repo=https://github.com/ordpool-space/cat21-backend-build.git \
          --branch=main \
          --dir=dist \
          --name="The Buildbot" \
          --email=noreply@haushoppe.art \
          --no-notfound \
          --no-nojekyll
