name: Build Cat21 Frontend

on:
  workflow_dispatch:
  push:
    branches: [ stage_prod ]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-cat21-frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      working-directory: frontend
      run: npm ci --legacy-peer-deps

    - name: Build production
      working-directory: frontend
      run: npm run build

    - name: Deploy to ordpool-space/cat21-frontend-build
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      working-directory: frontend
      # Artifact branch is `stage_prod` (underscore) — same convention as
      # all other build pipelines in the org. Cloudflare Pages serves
      # cat21.space from this branch.
      run: |
        npx angular-cli-ghpages \
          --repo=https://github.com/ordpool-space/cat21-frontend-build.git \
          --branch=stage_prod \
          --dir=dist/browser \
          --name="The Buildbot" \
          --email=noreply@haushoppe.art \
          --no-notfound \
          --no-nojekyll
