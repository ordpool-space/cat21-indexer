name: E2E (regtest mint — cat21-wallet)

# CAT-21 wallet variant of the regtest mint suite. Runs as a separate
# workflow so the two wallets iterate independently and CI signal
# stays cleanly attributed.

on:
  workflow_dispatch:
  schedule:
    - cron: '53 3 * * *'   # nightly at 03:53 UTC (offset from other runs)
  push:
    paths:
      - 'frontend/e2e/regtest/cat21wallet-mint-regtest.spec.ts'
      - 'frontend/e2e/regtest/lib/**'
      - 'frontend/playwright.regtest.config.ts'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/src/**'
      - '.github/workflows/e2e-regtest-mint-cat21wallet.yml'

permissions:
  contents: read

concurrency:
  group: cat21-indexer-e2e-regtest-mint-cat21wallet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regtest-mint-cat21wallet:
    name: Regtest cat21.space mint via CAT-21 wallet
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout cat21-indexer
        uses: actions/checkout@v4

      - name: Setup Node (frontend)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend deps (brings ordpool-sdk into node_modules)
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Make SDK consumer-environment scripts executable
        run: chmod +x frontend/node_modules/ordpool-sdk/e2e/consumer-environment-bootstrap.sh

      - name: Bring up consumer-environment (bitcoind + electrs + mariadb)
        run: |
          frontend/node_modules/ordpool-sdk/e2e/consumer-environment-bootstrap.sh \
            > stack.json
          cat stack.json

      - name: Start fees + electrs HTTP shim on :8999
        run: |
          ELECTRS_URL=http://localhost:3000 PORT=8999 \
            nohup node e2e/fees-electrs-stub.mjs > fees-stub.log 2>&1 &
          echo $! > fees-stub.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8999/healthz >/dev/null 2>&1; then
              echo "fees-stub up"; break
            fi
            if [ "$i" = "30" ]; then
              echo "fees-stub never came up"; cat fees-stub.log || true; exit 1
            fi
            sleep 1
          done

      - name: Checkout ordpool-sdk (for the cat21-wallet extension + bootstrap)
        uses: actions/checkout@v4
        with:
          repository: ordpool-space/ordpool-sdk
          path: sdk
          ref: main

      - name: Setup Node (sdk)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'sdk/package-lock.json'

      - name: Install SDK deps + build
        working-directory: sdk
        run: |
          npm ci
          npm run build

      - name: Install Playwright system deps + Chromium
        working-directory: sdk
        run: npx playwright install --with-deps chromium

      # CAT-21 wallet doesn't ship a published .crx yet — build from
      # source in CI. cat21-wallet is a public repo; checkout works
      # without auth.
      - name: Checkout cat21-wallet (extension source)
        uses: actions/checkout@v4
        with:
          repository: ordpool-space/cat21-wallet
          path: cat21-wallet-src
          ref: main

      - name: Setup pnpm for cat21-wallet build
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Cache cat21-wallet pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: cat21wallet-pnpm-${{ hashFiles('cat21-wallet-src/pnpm-lock.yaml') }}
          restore-keys: |
            cat21wallet-pnpm-

      - name: Cache cat21-wallet extension dist
        id: cat21wallet-dist-cache
        uses: actions/cache@v4
        with:
          path: cat21-wallet-src/apps/extension/dist
          key: cat21wallet-dist-${{ hashFiles('cat21-wallet-src/pnpm-lock.yaml', 'cat21-wallet-src/apps/extension/**/*.ts', 'cat21-wallet-src/apps/extension/**/*.tsx', 'cat21-wallet-src/packages/**/*.ts') }}

      - name: Install cat21-wallet dependencies
        if: steps.cat21wallet-dist-cache.outputs.cache-hit != 'true'
        working-directory: cat21-wallet-src
        run: pnpm install --frozen-lockfile

      - name: Build cat21-wallet extension
        if: steps.cat21wallet-dist-cache.outputs.cache-hit != 'true'
        working-directory: cat21-wallet-src
        run: pnpm build:extension

      - name: Stage cat21-wallet extension via SDK bootstrap (LOCAL_DIST mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAT21_WALLET_LOCAL_DIST: ${{ github.workspace }}/cat21-wallet-src/apps/extension/dist
        working-directory: sdk
        run: bash e2e/playwright/playwright-bootstrap.sh cat21wallet

      - name: Bootstrap regtest funds (101 blocks, dump WIF)
        working-directory: sdk
        run: |
          chmod +x e2e/regtest-bootstrap.sh
          ./e2e/regtest-bootstrap.sh > regtest-bootstrap.json
          cat regtest-bootstrap.json

      - name: Patch cat21Config + bitcoinNetwork for regtest
        working-directory: frontend
        run: |
          sed -i \
            -e "s|'https://api\.ordpool\.space'|'http://localhost:8999'|g" \
            -e "s|'https://backend2\.cat21\.space'|'http://localhost:9998'|g" \
            -e "s|'https://ord\.ordpool\.space'|'http://localhost:9999'|g" \
            -e "s|'https://ord\.cat21\.space'|'http://localhost:9999'|g" \
            -e 's|useValue: Network\.Mainnet|useValue: Network.Regtest|' \
            src/app/app.config.ts

      - name: Build static frontend bundle
        working-directory: frontend
        run: |
          set -o pipefail
          npx ng build --output-path ../dist-regtest 2>&1 | tee ../build.log

      - name: Locate the built browser output
        run: |
          for candidate in \
              dist-regtest \
              dist-regtest/browser \
              $(find dist-regtest -maxdepth 3 -type d -name browser); do
            if [ -f "$candidate/index.html" ]; then
              BROWSER_DIR="$candidate"
              break
            fi
          done
          if [ -z "${BROWSER_DIR:-}" ]; then
            echo "could not find any index.html under dist-regtest"
            ls -la dist-regtest || true
            tail -200 build.log || true
            exit 1
          fi
          echo "BROWSER_DIR=$BROWSER_DIR" >> "$GITHUB_ENV"

      - name: Serve the static bundle on :4221
        run: |
          nohup npx -y serve@14 -s "$BROWSER_DIR" -l 4221 --no-clipboard > serve.log 2>&1 &
          echo $! > serve.pid

      - name: Wait for static server ready on :4221
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4221/ 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "static server up"; break
            fi
            if [ "$i" = "30" ]; then
              echo "static server never came up (last HTTP $code)"; tail -200 serve.log || true; exit 1
            fi
            sleep 1
          done

      - name: Install Playwright in the frontend tree
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Lift SDK e2e helpers out of node_modules
        working-directory: frontend
        run: |
          mkdir -p e2e/regtest/sdk-lib
          cp node_modules/ordpool-sdk/e2e/regtest/regtest-helpers.ts e2e/regtest/sdk-lib/
          cp node_modules/ordpool-sdk/e2e/playwright/approval-popup.ts e2e/regtest/sdk-lib/
          cp node_modules/ordpool-sdk/e2e/playwright/cat21wallet-sign-popup.ts e2e/regtest/sdk-lib/

      - name: Run the cat21-wallet regtest spec
        working-directory: frontend
        env:
          CAT21WALLET_EXT_PATH: ${{ github.workspace }}/sdk/e2e/extensions/cat21wallet
          FRONTEND_URL: http://localhost:4221
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1280x900x24' \
            npx playwright test e2e/regtest/cat21wallet-mint-regtest.spec.ts \
            --config=playwright.regtest.config.ts

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regtest-mint-cat21wallet-playwright-${{ github.run_id }}
          path: |
            frontend/test-results
            frontend/playwright-report-regtest
            build.log
            serve.log
            fees-stub.log
          retention-days: 14
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
            -f frontend/node_modules/ordpool-sdk/e2e/docker-compose.consumer-environment.yml \
            down -v || true
          if [ -f fees-stub.pid ]; then
            kill "$(cat fees-stub.pid)" 2>/dev/null || true
          fi
          if [ -f serve.pid ]; then
            kill "$(cat serve.pid)" 2>/dev/null || true
          fi
